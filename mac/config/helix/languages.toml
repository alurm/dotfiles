[language-server.rust-analyzer.config]
check.command = "clippy"

[[language]]
name = "python"
auto-format = true

[language-server.ty]
config.experimental.rename = true

[[language]]
name = "nix"
formatter = { command = "alejandra" }

[[language]]
name = "javascript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "typescript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true
